const params = new URLSearchParams(location.search);
const id = params.get("id");

const episodes = data[id] || [];

const player = document.getElementById("player");
const grid = document.getElementById("episodes");

let current = 0;
let server = 1;


const key = "resume_" + id;


function getUrl(ep){
 return server === 1 ? ep.s1 : ep.s2;
}


function saveProgress(){
 localStorage.setItem(key, JSON.stringify({
  index: current
 }));
}


function loadEpisode(index){

 if(!episodes[index]) return;

 current = index;

 const url = getUrl(episodes[index]);

 player.src = url;

 updateActive();
 preloadNext(index);

 saveProgress();
}


function updateActive(){
 document.querySelectorAll(".episode").forEach((b,i)=>{
  b.classList.toggle("active", i === current);
 });
}


function preloadNext(index){
 const next = episodes[index + 1];
 if(!next) return;

 const img = new Image();
 img.src = next.s1;
}


function setServer(s){
 server = s;

 document.querySelectorAll(".controls .btn").forEach((b,i)=>{
  if(i < 2) b.classList.toggle("active", i === s-1);
 });

 loadEpisode(current);
}


function nextEpisode(){
 if(current < episodes.length - 1){
  loadEpisode(current + 1);
 }
}


function generateEpisodes(){

 const frag = document.createDocumentFragment();

 episodes.forEach((_,i)=>{
  const btn = document.createElement("button");
  btn.className = "episode";
  btn.textContent = "EP " + (i+1);
  btn.onclick = ()=>loadEpisode(i);
  frag.appendChild(btn);
 });

 grid.appendChild(frag);
}


generateEpisodes();


const saved = localStorage.getItem(key);

if(saved){
 const data = JSON.parse(saved);

 if(episodes[data.index]){
  loadEpisode(data.index);
 } else {
  loadEpisode(0);
 }
} else {
 loadEpisode(0);
}
